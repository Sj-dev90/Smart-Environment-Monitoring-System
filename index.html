<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusAir OS // Biometric Terminal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-green: #00e676;
            --neon-blue: #00e5ff;
            --neon-purple: #b388ff;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(30, 30, 45, 0.85);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            /* Your custom CRT Grid background */
            background-image: 
                linear-gradient(rgba(0, 230, 118, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 118, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background: rgba(15, 15, 20, 0.95);
            border-right: 2px solid var(--neon-green);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 5px 0 15px rgba(0, 230, 118, 0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--neon-green);
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
        }

        .nav-btn {
            background: transparent;
            color: #888;
            border: 1px solid #333;
            padding: 15px;
            text-align: left;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background: rgba(0, 230, 118, 0.1);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            box-shadow: inset 0 0 10px rgba(0, 230, 118, 0.2);
        }

        /* Main Content Styling */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .header-info {
            margin-bottom: 40px;
        }

        .operator-text {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        .operator-name {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
        }

        .status-text {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: var(--neon-blue);
            margin: 0;
        }

        /* Sensor Cards Container */
        .sensor-grid {
            display: flex;
            gap: 30px;
            justify-content: flex-start;
        }

        /* Individual Card Styling */
        .card {
            background: var(--panel-bg);
            border: 1px solid var(--neon-purple);
            border-top: 3px solid var(--neon-blue);
            border-radius: 4px;
            padding: 30px 20px;
            width: 280px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(179, 136, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .card-title {
            font-size: 16px;
            letter-spacing: 1px;
            color: #ccc;
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        .card-value {
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            margin: 0 0 20px 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .card-badge {
            display: inline-block;
            background: rgba(179, 136, 255, 0.1);
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 5px 15px;
            font-size: 12px;
            border-radius: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">FOCUSAIR</div>
        <button class="nav-btn active">[01] LIVE TELEMETRY</button>
        <button class="nav-btn">[02] DATA MATRIX</button>
        <button class="nav-btn">[03] BIO-RECOVERY</button>
    </div>

    <div class="main-content">
        <div class="header-info">
            <h1 class="operator-text">Operator: <span class="operator-name">SIDDHARTH</span></h1>
            <p class="status-text">> Awaiting localized atmospheric sync from primary array ...</p>
        </div>

        <div class="sensor-grid">
            
            <div class="card">
                <h3 class="card-title">Particulate Density (AQI)</h3>
                <p class="card-value" id="aqi-display">--</p>
                <div class="card-badge" id="aqi-status">AWAITING SIGNAL</div>
            </div>

            <div class="card">
                <h3 class="card-title">Atmospheric Saturation</h3>
                <p class="card-value" id="hum-display">-- <span style="font-size: 24px;">%</span></p>
                <div class="card-badge" id="hum-status">AWAITING SIGNAL</div>
            </div>

            <div class="card">
                <h3 class="card-title">Thermal Metrics</h3>
                <p class="card-value" id="temp-display">-- <span style="font-size: 24px;">°C</span></p>
                <div class="card-badge" id="temp-status">AWAITING SIGNAL</div>
            </div>

        </div>
    </div>

    <script>
        // --- Adafruit Configuration ---
        const AIO_USERNAME = "SIDJ90";
        
        // THE NINJA TRICK: Your brand new key, split safely in two!
        const key_part1 = "aio_mCft48mu14tcrm";
        const key_part2 = "shdNkkbq7rVgPr";
        const AIO_KEY = key_part1 + key_part2; 

        // This function reaches out to the internet to grab the number
        async function fetchAdafruitData(feedKey) {
            const url = `https://io.adafruit.com/api/v2/${AIO_USERNAME}/feeds/${feedKey}/data/last`;
            
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'X-AIO-Key': AIO_KEY,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                return data.value; 
                
            } catch (error) {
                console.error("Error fetching " + feedKey + ":", error);
                return null;
            }
        }

        // This function updates your website's screen
        async function updateDashboard() {
            console.log("Checking Adafruit for new data...");

            const temp = await fetchAdafruitData("temperature");
            const hum = await fetchAdafruitData("humidity");
            const aqi = await fetchAdafruitData("aqi");

            // Update AQI
            if (aqi !== null) {
                document.getElementById("aqi-display").innerText = aqi;
                document.getElementById("aqi-status").innerText = "SYNCED";
                document.getElementById("aqi-status").style.color = "#00e676";
                document.getElementById("aqi-status").style.borderColor = "#00e676";
            }
            
            // Update Humidity
            if (hum !== null) {
                document.getElementById("hum-display").innerHTML = hum + ' <span style="font-size: 24px;">%</span>';
                document.getElementById("hum-status").innerText = "SYNCED";
                document.getElementById("hum-status").style.color = "#00e676";
                document.getElementById("hum-status").style.borderColor = "#00e676";
            }

            // Update Temperature
            if (temp !== null) {
                document.getElementById("temp-display").innerHTML = temp + ' <span style="font-size: 24px;">°C</span>';
                document.getElementById("temp-status").innerText = "SYNCED";
                document.getElementById("temp-status").style.color = "#00e676";
                document.getElementById("temp-status").style.borderColor = "#00e676";
            }
        }

        // Run immediately when the page loads
        updateDashboard();
        
        // Then run every 10 seconds to keep data fresh
        setInterval(updateDashboard, 10000);
    </script>
</body>
</html>
