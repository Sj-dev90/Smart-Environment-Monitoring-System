<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusAir OS</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0f0f13; color: #ffffff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #auth-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #0f0f13; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .auth-box { background: #1c1c24; padding: 40px; border-radius: 15px; text-align: center; border-top: 5px solid #00e676; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 1em; width: 100%; box-sizing: border-box; background: #2d2d3b; color: #fff; text-align: center; }
        button { padding: 12px; margin-top: 15px; background-color: #00e676; color: #0f0f13; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .secondary-btn { background-color: transparent; border: 1px solid #00e676; color: #00e676; margin-top: 10px; }
        #main-app { display: none; width: 100%; }
        nav { width: 250px; background: #1c1c24; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .card-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: #1c1c24; padding: 30px; border-radius: 15px; flex: 1; min-width: 250px; text-align: center; border-left: 5px solid #00e676; }
        .value { font-size: 3em; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="color: #00e676;">FocusAir Access</h2>
            <input type="email" id="email" placeholder="Email Address" autocomplete="off">
            <input type="password" id="password" placeholder="Password" autocomplete="off">
            
            <div id="register-fields" style="display: none;">
                <input type="text" id="operatorName" placeholder="Operator Name" autocomplete="off">
                <input type="text" id="channelId" placeholder="ThingSpeak Channel ID" autocomplete="off">
            </div>
            
            <button id="primary-btn" onclick="executeAuth()">Login</button>
            <button class="secondary-btn" onclick="toggleMode()" id="toggle-btn">Need an account? Register</button>
        </div>
    </div>

    <div id="main-app">
        <nav>
            <h2 style="text-align: center; color: #00e676;">FocusAir OS</h2>
            <button onclick="logout()" class="secondary-btn">Sign Out</button>
        </nav>
        <main>
            <h1>Welcome, <span id="displayName" style="color:#00e676;"></span></h1>
            <p>Secure connection established.</p>
            <div class="card-grid">
                <div class="card">
                    <h3>Current AQI</h3>
                    <div class="value" id="aqi-val">--</div>
                </div>
                <div class="card">
                    <h3>Relative Humidity</h3>
                    <div class="value" id="hum-val">--%</div>
                </div>
                <div class="card">
                    <h3>Temperature</h3>
                    <div class="value" id="temp-val">--&deg;C</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "PASTE_YOUR_AUTH_DOMAIN_HERE",
            projectId: "PASTE_YOUR_PROJECT_ID_HERE",
            storageBucket: "PASTE_YOUR_STORAGE_BUCKET_HERE",
            messagingSenderId: "PASTE_YOUR_SENDER_ID_HERE",
            appId: "PASTE_YOUR_APP_ID_HERE"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isLoginMode = true;
        let currentChannel = "";
        let syncInterval;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('register-fields').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('primary-btn').innerText = isLoginMode ? 'Login' : 'Register Hardware';
            document.getElementById('toggle-btn').innerText = isLoginMode ? 'Need an account? Register' : 'Have an account? Login';
        }

        function executeAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (isLoginMode) {
                auth.signInWithEmailAndPassword(email, password)
                    .then(userCredential => loadUserData(userCredential.user.uid))
                    .catch(err => alert("Authentication Failed: " + err.message));
            } else {
                const name = document.getElementById('operatorName').value.trim();
                const channel = document.getElementById('channelId').value.trim();
                
                if (!name || !channel) {
                    alert("Please provide both Operator Name and Channel ID.");
                    return;
                }

                auth.createUserWithEmailAndPassword(email, password)
                    .then(userCredential => {
                        db.collection('operators').doc(userCredential.user.uid).set({
                            operatorName: name,
                            channelID: channel
                        }).then(() => loadUserData(userCredential.user.uid));
                    })
                    .catch(err => alert("Registration Failed: " + err.message));
            }
        }

        function loadUserData(uid) {
            db.collection('operators').doc(uid).get()
                .then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('displayName').innerText = data.operatorName;
                        currentChannel = data.channelID;
                        
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'flex';
                        
                        fetchData();
                        syncInterval = setInterval(fetchData, 15000);
                    } else {
                        alert("Error: Operator database record not found.");
                    }
                });
        }

        function logout() {
            auth.signOut().then(() => {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                clearInterval(syncInterval);
                currentChannel = "";
            });
        }

        function fetchData() {
            if (!currentChannel) return;
            fetch(`https://api.thingspeak.com/channels/${currentChannel}/feeds.json?results=1`)
                .then(res => res.json())
                .then(data => {
                    if (data.feeds && data.feeds.length > 0) {
                        const latest = data.feeds[0];
                        document.getElementById('aqi-val').innerText = latest.field1 || "--";
                        document.getElementById('hum-val').innerText = latest.field2 ? latest.field2 + "%" : "--%";
                        document.getElementById('temp-val').innerText = latest.field3 ? latest.field3 + "°C" : "--°C";
                    }
                })
                .catch(err => console.log("ThingSpeak Sync Error", err));
        }
    </script>
</body>
</html>
