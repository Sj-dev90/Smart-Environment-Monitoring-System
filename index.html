<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusAir OS // Biometric Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00e676;
            --neon-blue: #00b5ff;
            --neon-red: #ff3d00;
            --bg-dark: #0a0a0c;
            --panel-bg: rgba(30, 30, 40, 0.85);
            --border-glow: 0 0 10px rgba(0, 230, 118, 0.2);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            /* Subtle CRT Scanline effect */
            background-image: 
                linear-gradient(rgba(0, 230, 118, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 118, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--neon-green);
            padding: 20px;
            box-shadow: var(--border-glow);
            z-index: 10;
        }

        .logo {
            font-family: 'Fira Code', monospace;
            color: var(--neon-green);
            font-size: 24px;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 5px var(--neon-green);
        }

        .nav-item {
            font-family: 'Fira Code', monospace;
            padding: 15px 10px;
            margin-bottom: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active {
            background-color: rgba(0, 230, 118, 0.1);
            border-left: 4px solid var(--neon-green);
            color: var(--neon-green);
        }

        /* Main Content Styling */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .header-area {
            margin-bottom: 40px;
        }

        .operator-title {
            font-size: 28px;
            letter-spacing: 1px;
            margin: 0 0 10px 0;
        }

        .operator-name {
            color: var(--neon-green);
            text-shadow: 0 0 8px rgba(0, 230, 118, 0.5);
        }

        .status-text {
            font-family: 'Fira Code', monospace;
            color: var(--neon-blue);
            font-size: 14px;
            margin: 0;
        }

        /* Sensor Cards Grid */
        .dashboard-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .sensor-card {
            background-color: var(--panel-bg);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 30px;
            flex: 1;
            min-width: 250px;
            text-align: center;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .sensor-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--neon-blue);
            border-radius: 8px 8px 0 0;
        }

        .card-title {
            font-size: 16px;
            color: #aaa;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .sensor-value {
            font-size: 48px;
            font-weight: 700;
            margin: 20px 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .status-badge {
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.1);
            color: #888;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid #555;
            transition: all 0.3s;
        }

        /* When data arrives, we add this class to make it glow */
        .status-badge.synced {
            background-color: rgba(0, 230, 118, 0.15);
            color: var(--neon-green);
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.3);
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">FOCUSAIR</div>
        <div class="nav-item active">[01] LIVE TELEMETRY</div>
        <div class="nav-item">[02] DATA MATRIX</div>
        <div class="nav-item">[03] BIO-RECOVERY</div>
    </div>

    <div class="main-content">
        <div class="header-area">
            <h2 class="operator-title">Operator: <span class="operator-name">SIDDHARTH</span></h2>
            <p class="status-text" id="system-status">> Awaiting localized atmospheric sync from primary array ...</p>
        </div>

        <div class="dashboard-grid">
            
            <div class="sensor-card">
                <h3 class="card-title">PARTICULATE DENSITY (AQI)</h3>
                <div class="sensor-value" id="aqi-display">--</div>
                <div class="status-badge" id="aqi-badge">AWAITING SIGNAL</div>
            </div>

            <div class="sensor-card">
                <h3 class="card-title">ATMOSPHERIC SATURATION</h3>
                <div class="sensor-value" id="hum-display">-- %</div>
                <div class="status-badge" id="hum-badge">AWAITING SIGNAL</div>
            </div>

            <div class="sensor-card">
                <h3 class="card-title">THERMAL METRICS</h3>
                <div class="sensor-value" id="temp-display">-- °C</div>
                <div class="status-badge" id="temp-badge">AWAITING SIGNAL</div>
            </div>

        </div>
    </div>

    <script>
        // Your lowercase Adafruit username
        const AIO_USERNAME = "sidj90";

        // This function fetches the data from the PUBLIC feeds
        async function fetchAdafruitData(feedKey) {
            const url = `https://io.adafruit.com/api/v2/${AIO_USERNAME}/feeds/${feedKey}/data/last`;
            
            try {
                // No API key needed because the feed is public!
                const response = await fetch(url); 
                const data = await response.json();
                return data.value; 
            } catch (error) {
                console.error("Error fetching " + feedKey + ":", error);
                return null;
            }
        }

        // This function updates the HTML screen
        async function updateDashboard() {
            console.log("Fetching live telemetry...");

            const aqi = await fetchAdafruitData("aqi");
            const hum = await fetchAdafruitData("humidity");
            const temp = await fetchAdafruitData("temperature");

            // Update AQI
            if (aqi !== null) {
                document.getElementById("aqi-display").innerText = aqi;
                document.getElementById("aqi-badge").innerText = "DATA SYNCED";
                document.getElementById("aqi-badge").classList.add("synced");
            }

            // Update Humidity
            if (hum !== null) {
                document.getElementById("hum-display").innerText = hum + " %";
                document.getElementById("hum-badge").innerText = "DATA SYNCED";
                document.getElementById("hum-badge").classList.add("synced");
            }

            // Update Temperature
            if (temp !== null) {
                document.getElementById("temp-display").innerText = temp + " °C";
                document.getElementById("temp-badge").innerText = "DATA SYNCED";
                document.getElementById("temp-badge").classList.add("synced");
            }

            // Update the top system status text if all systems are go
            if (aqi !== null && hum !== null && temp !== null) {
                document.getElementById("system-status").innerText = "> Primary array connection established. Telemetry live.";
                document.getElementById("system-status").style.color = "var(--neon-green)";
            }
        }

        // Run immediately, then check every 10 seconds
        updateDashboard();
        setInterval(updateDashboard, 10000);
    </script>
</body>
</html>
